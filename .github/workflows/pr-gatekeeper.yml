name: PR Quality Gatekeeper

on:
  pull_request:
    branches: [ main ]

jobs:
  verify-contribution:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest requests flask

    - name: Lint Code for Structural Slop
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all other lint warnings as advice rather than a hard crash
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Verify Core Compilation
      run: |
        python -c "
        import sys
        sys.path.insert(0, '.')
        from core_engine.database import init_db
        from core_engine.prompt_builder import build_production_prompt
        print('CORE PACKAGES COMPILE CLEANLY')
        "